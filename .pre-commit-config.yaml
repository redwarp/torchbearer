# See https://pre-commit.com for more information.
# Install the git hook with: pre-commit install

# CHANGELOG.md is generated by git-cliff as UTF-16; the text hooks would corrupt
# its encoding (e.g. appending a bare LF byte), so it is left untouched.
exclude: '^CHANGELOG\.md$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: cargo-fmt-nightly
        name: cargo +nightly fmt
        description: Format Rust code (including doc comments) with the nightly formatter.
        entry: cargo +nightly fmt
        args: ["--", "--config-path=nightly_rustfmt.toml"]
        language: system
        types: [rust]
        pass_filenames: false
